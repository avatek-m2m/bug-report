<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitações | Admin Full View</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] p-4 md:p-8 font-sans">
    <div class="max-w-full mx-auto px-4">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 italic">Solicitações <span class="text-blue-600">Admin</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Gestão Completa de Dados</p>
            </div>
            <a href="index.html" class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition shadow-sm">← Voltar</a>
        </header>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 mb-10">
            <h2 class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-6">Nova Entrada</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-7 gap-6">
                
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Data</label>
                    <input type="date" id="data_sol" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none text-slate-600">
                    <span class="text-[9px] text-slate-400 ml-1">Dia da solicitação</span>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Tipo</label>
                    <input type="text" id="tipo" placeholder="Ex: Ajuste, Novo" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                    <span class="text-[9px] text-slate-400 ml-1">Categoria da tarefa</span>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Local</label>
                    <input type="text" id="local" placeholder="Ex: Dashboard, API" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                    <span class="text-[9px] text-slate-400 ml-1">Onde será alterado</span>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Descrição</label>
                    <input type="text" id="desc" placeholder="O que deve ser feito?" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                    <span class="text-[9px] text-slate-400 ml-1">Detalhes da mudança</span>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Prioridade</label>
                    <select id="prio" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none text-slate-500 font-medium">
                        <option value="Baixa">Baixa</option>
                        <option value="Média">Média</option>
                        <option value="Alta">Alta</option>
                        <option value="Urgente">Urgente</option>
                    </select>
                    <span class="text-[9px] text-slate-400 ml-1">Nível de criticidade</span>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Prazo</label>
                    <input type="text" id="prazo" placeholder="Ex: 5 dias, Imediato" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none">
                    <span class="text-[9px] text-slate-400 ml-1">Tempo de entrega</span>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Status</label>
                    <select id="status" class="bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm border-none text-slate-500 font-medium">
                        <option value="Pendente">Pendente</option>
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Concluído">Concluído</option>
                    </select>
                    <span class="text-[9px] text-slate-400 ml-1">Estado atual</span>
                </div>

            </div>
            
            <button onclick="adicionar()" class="w-full mt-8 bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-100 transition-all text-sm uppercase tracking-[0.2em]">
                Publicar Solicitação na Base
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-200">
            <div id="loading" class="py-20 text-center font-medium text-slate-400 animate-pulse tracking-widest uppercase text-[10px]">Sincronizando Dados com Google Sheets...</div>
            <div id="container" class="hidden overflow-x-auto">
                <table class="w-full text-left table-auto">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] font-bold uppercase tracking-widest border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-5">Data</th>
                            <th class="px-6 py-5">Tipo</th>
                            <th class="px-6 py-5">Local</th>
                            <th class="px-6 py-5 min-w-[350px]">Descrição Detalhada</th>
                            <th class="px-6 py-5 text-center">Prio.</th>
                            <th class="px-6 py-5 text-center">Status</th>
                            <th class="px-6 py-5">Prazo</th>
                            <th class="px-6 py-5 text-right">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="lista" class="text-sm text-slate-600 divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzqVRtAJCIwGGeZYQ0-MoHGZUGGbfq84F-hZ4zC4fb5EMw10MQ-EBmH6Q8e5VOVNsq1/exec';
        const ABA = 'Solicitacoes';

        async function carregar() {
            const res = await fetch(`${API}?aba=${ABA}`);
            const dados = await res.json();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('container').classList.remove('hidden');
            
            const lista = document.getElementById('lista');
            lista.innerHTML = dados.map(item => {
                const coresStatus = {
                    'Pendente': 'bg-amber-50 text-amber-600 border-amber-100',
                    'Em Andamento': 'bg-blue-50 text-blue-600 border-blue-100',
                    'Concluído': 'bg-emerald-50 text-emerald-600 border-emerald-100'
                };
                const statusClass = coresStatus[item.STATUS] || 'bg-slate-50 text-slate-500';

                return `
                <tr class="hover:bg-blue-50/20 transition-colors align-top">
                    <td class="px-6 py-5 font-bold text-slate-400 text-[10px] whitespace-nowrap">${item['DATA SOLICITACAO'] || '-'}</td>
                    <td class="px-6 py-5 font-black text-slate-800 text-[10px] uppercase tracking-tighter">${item.TIPO}</td>
                    <td class="px-6 py-5 font-bold text-slate-700">${item.LOCAL}</td>
                    <td class="px-6 py-5 text-slate-500 leading-relaxed whitespace-pre-wrap break-words text-xs italic">${item.DESCRIÇÃO || '-'}</td>
                    <td class="px-6 py-5 text-center">
                        <span class="text-[10px] font-black uppercase ${item.PRIORIDADE === 'Alta' || item.PRIORIDADE === 'Urgente' ? 'text-red-500' : 'text-slate-400'}">
                            ${item.PRIORIDADE}
                        </span>
                    </td>
                    <td class="px-6 py-5 text-center font-medium">
                        <span class="px-3 py-1 rounded-full border text-[10px] font-bold ${statusClass}">
                            ${item.STATUS || 'Pendente'}
                        </span>
                    </td>
                    <td class="px-6 py-5 font-bold text-slate-400 text-xs italic">${item.PRAZO}</td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="excluir(${item.id_linha})" class="p-2 hover:bg-red-50 rounded-lg text-red-200 hover:text-red-500 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        async function adicionar() {
            const btn = event.target;
            btn.innerText = "Sincronizando com a nuvem...";
            btn.disabled = true;

            let dataInput = document.getElementById('data_sol').value;
            if(dataInput) {
                const parts = dataInput.split('-');
                dataInput = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }

            const dados = [
                document.getElementById('tipo').value,
                document.getElementById('local').value,
                document.getElementById('desc').value,
                document.getElementById('prio').value,
                document.getElementById('prazo').value,
                document.getElementById('status').value,
                dataInput
            ];

            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ acao: 'ADICIONAR', aba: ABA, dados: dados }) });
            setTimeout(() => location.reload(), 1200);
        }

        async function excluir(id) {
            if(confirm('Remover esta solicitação?')) {
                await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ acao: 'EXCLUIR', aba: ABA, id_linha: id }) });
                setTimeout(() => location.reload(), 800);
            }
        }
        carregar();
    </script>
</body>
</html>
